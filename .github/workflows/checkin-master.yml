name: Checkin check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      checks: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Run tests
      run: dotnet test --configuration Release --logger "trx;LogFileName=test_results.trx" --collect:"XPlat Code Coverage" --results-directory TestResults

    - name: Find coverage file
      run: |
        echo "Coverage files:"
        find . -type f -name "coverage.cobertura.xml" -print || true

    - name: Publish Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: TestResults/test_results.trx

    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v3
      with:
        artifact: test-results
        name: Test Results
        path: test_results.trx
        reporter: dotnet-trx

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-reports
        path: |
          **/TestResults/**/coverage.cobertura.xml

    - name: Upload to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: |
          **/TestResults/**/coverage.cobertura.xml
        fail_ci_if_error: false
