name: Checkin check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: checkin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      actions: read
      checks: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore DMIProxy.slnx

    - name: Build
      run: dotnet build DMIProxy.slnx --configuration Release --no-restore

    - name: Run tests
      run: >
        dotnet test DMIProxy.slnx 
        --configuration Release 
        --no-build 
        --logger "trx;LogFileName=test_results.trx" 
        --collect:"XPlat Code Coverage" 
        --results-directory TestResults

    - name: Find coverage file
      run: |
        echo "Coverage files:"
        find . -type f -name "coverage.cobertura.xml" -print || true

    - name: Publish Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ github.run_id }}
        path: TestResults/**

    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v3
      with:
        artifact: test-results-${{ github.run_id }}
        name: Test Results
        path: "*.trx"
        reporter: dotnet-trx

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-reports
        path: |
          **/TestResults/**/coverage.cobertura.xml

    - name: Upload to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: |
          **/TestResults/**/coverage.cobertura.xml
        fail_ci_if_error: false
