name: CI with Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test with coverage (XPlat)
      run: |
        dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

    - name: Find coverage file
      run: |
        echo "Coverage files:"
        find . -type f -name "coverage.cobertura.xml" -print || true

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          **/TestResults/**/coverage.cobertura.xml

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: |
          **/TestResults/**/coverage.cobertura.xml
        fail_ci_if_error: false
